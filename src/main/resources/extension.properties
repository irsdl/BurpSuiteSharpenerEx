name=Sharpener
version=4.8
url=https://github.com/irsdl/BurpSuiteSharpenerEx
issueTracker=https://github.com/irsdl/BurpSuiteSharpenerEx/issues
copyright=Released as open source under AGPL license\nOriginally released by MDSec - https://www.mdsec.co.uk/\nDeveloped by Soroush Dalili (@irsdl): https://burpsuite.ninja/
propertiesFileUrl=https://raw.githubusercontent.com/irsdl/BurpSuiteSharpenerEx/main/src/main/resources/extension.properties

# Extension features can be configured here
hasContextMenu = true
hasSuiteTab = false
hasTopMenu = true
hasHttpHandler = true
hasProxyHandler = true
hasHttpRequestEditor = false
hasHttpResponseEditor = false
isCommunityVersionCompatible = true
# Burp 2024.2 is the first release that requires Java 21.
# The extension jar contains Java 21 bytecode, so older Burp versions cannot load it.
# Major is the year (for example 2024), minor is the release number (for example 2).
minSupportedMajorVersionInclusive = 2024
minSupportedMinorVersionInclusive = 2

